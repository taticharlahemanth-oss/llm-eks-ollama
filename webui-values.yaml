replicaCount: 1

image:
  repository: ghcr.io/open-webui/open-webui
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ollama:
  enabled: true
  baseUrl: http://ollama:11434

resources:
  requests:
    cpu: "200m"
    memory: "512Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"

persistence:
  enabled: false

# 🔥 FIX HERE
pipelines:
  enabled: false

autoscaling:
  enabled: false

nodeSelector: {}
tolerations: []
affinity: {}

